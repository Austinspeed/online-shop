name: Update Mintlify API Documentation

on:
  push:
    branches:
      - main

jobs:
  update-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout online-shop
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Generate OpenAPI Specification
        run: npm run generate:openapi

      - name: Verify OpenAPI Specification
        run: |
          if [ ! -f docs/openapi.json ]; then
            echo "OpenAPI specification not found!"
            exit 1
          fi

      - name: Checkout mintlify-docs
        uses: actions/checkout@v4
        with:
          repository: Austinspeed/mintlify-docs
          token: ${{ secrets.MINTLIFY_PAT }}
          path: mintlify-docs

      - name: Copy latest OpenAPI specification
        run: |
          cp docs/openapi.json mintlify-docs/openapi.json

      - name: Commit and Push changes
        run: |
          cd mintlify-docs

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add openapi.json

          if git diff --cached --quiet; then
            echo "No OpenAPI changes detected."
            exit 0
          fi

          git commit -m "docs: update OpenAPI specification"
          git push origin main