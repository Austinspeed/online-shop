name: Update API Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Generate OpenAPI Spec
        run: npm run generate:openapi

      - name: Generate Mintlify API Pages
        run: npx @mintlify/scraping@latest openapi-file docs/openapi.json -o api

      - name: Commit Updated OpenAPI
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: regenerate API reference"
          file_pattern: |
            docs/openapi.json
            api/**